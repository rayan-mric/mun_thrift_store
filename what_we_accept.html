<!DOCTYPE html>
<html>
<head>
    <title>What We Accept</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark py-3">
  <div class="container">
    <a class="navbar-brand" href="index.html">MUN Thrift Store</a>
    <div>
      <a class="text-white me-4 text-decoration-none" href="what_we_accept.html">What We Accept</a>
      <a class="text-white me-4 text-decoration-none" href="about_us.html">About Us</a>
      <a class="text-white text-decoration-none" href="volunteer.html">Volunteer</a>
    </div>
  </div>
</nav>

<div class="container section-padding">
    <h1 class="text-center mb-5">What We Accept</h1>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow-sm p-4 text-center">
                 <img src="media/images/clothes.jpg" class="card-img-top img-fluid mx-auto w-75" alt="Card image cap">
                <h5 class="mt-4">Clothing</h5>
                <span class="badge badge-accept">Accepted</span>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="card shadow-sm p-4 text-center">
                 <img src="media/images/winter_clothes.jpg" class="card-img-top img-fluid mx-auto w-75" alt="Card image cap">
                <h5 class="mt-4">Winter Clothing</h5>
                <span class="badge badge-accept">Accepted</span>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm p-4 text-center">
                 <img src="media/images/shoes.jpg" class="card-img-top img-fluid mx-auto w-75" alt="Card image cap">
                <h5 class="mt-4">Shoes</h5>
                <span class="badge badge-accept">Accepted</span>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm p-4 text-center">
                 <img src="media/images/bedding.jpg" class="card-img-top img-fluid mx-auto w-75" alt="Card image cap">
                <h5 class="mt-4">Bedding</h5>
                <span class="badge badge-accept">Accepted</span>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm p-4 text-center">
                 <img src="media/images/accessories.jpg" class="card-img-top img-fluid mx-auto w-75" alt="Card image cap">
                <h5 class="mt-4">Accessories</h5>
                <span class="badge badge-accept">Accepted</span>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm p-4 text-center">
                 <img src="media/images/books.jpg" class="card-img-top img-fluid mx-auto w-75" alt="Card image cap">
                <h5 class="mt-4">Books</h5>
                <span class="badge badge-accept">Accepted</span>
            </div>
        </div>

    

    </div>

    <hr class="my-5">

    <h2 class="text-center">What We Do NOT Accept</h2>

    <div class="row g-4 mt-3">
        <div class="col-md-4">
            <div class="card shadow-sm p-4 border-danger">
                <h5>Damaged / Stained Items</h5>
                <span class="badge badge-reject">Not Accepted</span>
            </div>
        </div>
    </div>

</div>

<footer class="footer text-center">
    <div class="container">
        <p>© 2026 MUN Students First Thrift Store</p>
    </div>
</footer>
